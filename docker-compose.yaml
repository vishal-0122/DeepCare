version: '3.8'

services:
  deepcare-app:
    build: .
    container_name: deepcare-app
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      - MODEL_PATH=/app/models/best_model.pkl
      - SCALER_PATH=/app/models/scaler.pkl
      - RISK_THRESHOLD=0.35
    restart: unless-stopped